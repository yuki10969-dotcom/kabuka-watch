<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00e5ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="株価Watch">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株価監視アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a12;--panel:#0d1524;--panel2:#111e32;--border:#1c2e48;--cyan:#00e5ff;--green:#00ff9d;--red:#ff4d6d;--yellow:#ffe066;--purple:#b388ff;--text:#dce8f5;--muted:#4a6380;--dim:#7a9ab8}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,229,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 20px 80px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:50px;height:50px;background:linear-gradient(135deg,var(--cyan),var(--green));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(0,229,255,.3)}
.logo-title{font-size:22px;font-weight:900}
.logo-title span{color:var(--cyan)}
.logo-sub{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px}
.status{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px 14px;font-size:12px;font-family:'JetBrains Mono',monospace}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tabs{display:flex;gap:4px;margin-bottom:28px}
.tab{padding:10px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;border:1px solid transparent;color:var(--muted);transition:all .2s}
.tab.active{background:var(--panel);border-color:var(--cyan);color:var(--cyan)}
.tab:hover:not(.active){color:var(--text);border-color:var(--border)}
.ctrl{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all .3s;animation:up .4s ease both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--cyan),var(--green));opacity:0;transition:opacity .3s}
.card:hover{border-color:rgba(0,229,255,.3);transform:translateY(-2px)}
.card:hover::before{opacity:1}
.card.fired{border-color:var(--yellow);box-shadow:0 0 20px rgba(255,224,102,.15)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.code{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--cyan)}
.cname{font-size:12px;color:var(--dim);margin-top:2px}
.acts{display:flex;gap:6px}
.ibtn{width:30px;height:30px;border-radius:7px;background:var(--panel2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--dim);transition:all .15s}
.ibtn:hover{border-color:var(--cyan);color:var(--cyan)}
.ibtn.del:hover{border-color:var(--red);color:var(--red)}
.prow{display:flex;align-items:baseline;gap:8px;margin-bottom:12px}
.pmain{font-family:'JetBrains Mono',monospace;font-size:28px;font-weight:700}
.pchg{font-family:'JetBrains Mono',monospace;font-size:12px;padding:2px 7px;border-radius:4px;font-weight:600}
.pchg.up{background:rgba(0,255,157,.15);color:var(--green)}
.pchg.dn{background:rgba(255,77,109,.15);color:var(--red)}
.inds{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ibox{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.ilbl{font-size:10px;color:var(--muted);letter-spacing:1px;margin-bottom:3px;font-weight:700}
.ival{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600}
.ival.warn{color:var(--yellow)}
.ival.alert{color:var(--red);animation:blink 1s infinite}
.ival.good{color:var(--green)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;font-family:'JetBrains Mono',monospace}
.t-price{background:rgba(255,224,102,.15);color:var(--yellow);border:1px solid rgba(255,224,102,.3)}
.t-rsi{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.3)}
.t-ma{background:rgba(0,255,157,.1);color:var(--green);border:1px solid rgba(0,255,157,.3)}
.t-pbr{background:rgba(179,136,255,.1);color:var(--purple);border:1px solid rgba(179,136,255,.3)}
.t-fire{background:rgba(255,77,109,.2);color:var(--red);border:1px solid rgba(255,77,109,.4);animation:blink 1.5s infinite}
.upd{font-size:10px;color:var(--muted);margin-top:8px;font-family:'JetBrains Mono',monospace}
.empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:12px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
@media(max-width:640px){.sgrid{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px}
.ptitle{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.ptitle::before{content:'';display:block;width:3px;height:14px;background:var(--cyan);border-radius:2px}
label{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:5px;letter-spacing:.5px}
input[type=text],input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:9px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;margin-bottom:12px}
input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px rgba(0,229,255,.08)}
input::placeholder{color:var(--muted)}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.crow input[type=checkbox]{width:15px;height:15px;accent-color:var(--cyan);margin:0}
.crow label{margin:0;font-size:12px;color:var(--dim);cursor:pointer}
.btn{padding:10px 20px;border-radius:8px;border:none;font-family:'Zen Kaku Gothic New',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.bc{background:var(--cyan);color:#000}
.bc:hover{background:#33eeff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,229,255,.3)}
.bo{background:transparent;color:var(--dim);border:1px solid var(--border)}
.bo:hover{border-color:var(--cyan);color:var(--cyan)}
.br{background:transparent;color:var(--red);border:1px solid rgba(255,77,109,.4)}
.br:hover{background:rgba(255,77,109,.1)}
.bsm{padding:7px 14px;font-size:12px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.hint{font-size:11px;color:var(--muted);line-height:1.6;margin-top:-8px;margin-bottom:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:28px;width:92%;max-width:480px;animation:up .3s ease}
.mfoot{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);border:1px solid var(--cyan);border-radius:12px;padding:12px 22px;font-size:13px;color:var(--cyan);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:9998;opacity:0;transition:all .3s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:var(--red)}
.click-hint{color:var(--cyan);font-size:10px;margin-left:6px}
.card{cursor:pointer;user-select:none}
.card.selected{border-color:var(--cyan)!important}
.chart-panel{background:var(--panel);border:1px solid var(--cyan);border-radius:16px;padding:24px;margin-top:24px;box-shadow:0 0 32px rgba(0,229,255,.1)}
.chart-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.chart-name{font-size:16px;font-weight:900}.chart-name span{color:var(--cyan)}
.rng-row{display:flex;gap:4px}
.ct-row{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.rbtn{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .2s}
.rbtn.active{background:var(--cyan);color:#000;border-color:var(--cyan)}
.rbtn:hover:not(.active){border-color:var(--cyan);color:var(--cyan)}
.ctab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;color:var(--muted);transition:all .2s}
.ctab.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.06)}
.ctab.yact{border-color:var(--yellow);color:var(--yellow);background:rgba(255,224,102,.06)}
.ctab:hover:not(.active):not(.yact){color:var(--text)}
.chart-box{position:relative;height:360px;background:var(--bg);border-radius:8px;overflow:hidden}

.trade-panel{background:var(--panel);border:1px solid rgba(255,224,102,.4);border-radius:16px;padding:24px;margin-top:24px;box-shadow:0 0 32px rgba(255,224,102,.08)}
.tpt{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.tpt::before{content:'';display:block;width:3px;height:14px;background:var(--yellow);border-radius:2px}
.t-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.t-tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);color:var(--muted);background:transparent;transition:all .2s}
.t-tab.active{border-color:var(--yellow);color:var(--yellow);background:rgba(255,224,102,.06)}
.t-form{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;align-items:end;margin-bottom:4px}
.t-form label{font-size:11px;font-weight:700;color:var(--dim);display:block;margin-bottom:4px;letter-spacing:.5px}
.t-form input,.t-form select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;transition:border-color .2s}
.t-form input:focus,.t-form select:focus{border-color:var(--yellow)}
.t-form select option{background:var(--panel)}
.smry{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.sbox{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:120px}
.sbox .sl{font-size:10px;color:var(--muted);letter-spacing:.5px;margin-bottom:4px}
.sbox .sv{font-size:17px;font-weight:900;font-family:'JetBrains Mono',monospace}
.t-tbl-wrap{overflow-x:auto;margin-top:4px}
.t-tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
.t-tbl th{text-align:left;color:var(--muted);font-weight:700;font-size:10px;letter-spacing:1px;padding:6px 8px;border-bottom:1px solid var(--border)}
.t-tbl td{padding:7px 8px;border-bottom:1px solid rgba(28,46,72,.4)}
.t-tbl tr:hover td{background:rgba(255,224,102,.04)}
.pp{color:#00ff9d;font-weight:700}.np{color:#ff4d6d;font-weight:700}.zp{color:var(--muted)}
.tc-buy{color:#00ff9d}.tc-sell{color:#ff4d6d}.tc-mbuy{color:#ffe066}.tc-short{color:#b388ff}
.td-btn{cursor:pointer;color:var(--muted);font-size:13px;padding:2px 6px;border-radius:4px;border:none;background:transparent;transition:all .2s}
.td-btn:hover{color:#ff4d6d;background:rgba(255,77,109,.12)}

#pwa-banner{display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;
  background:linear-gradient(135deg,rgba(6,10,18,.97),rgba(13,21,36,.97));
  border-top:1px solid var(--cyan);padding:16px 20px;
  box-shadow:0 -8px 32px rgba(0,229,255,.15);}
#pwa-banner .pb-row{display:flex;align-items:center;gap:14px;}
#pwa-banner .pb-icon{width:48px;height:48px;border-radius:12px;background:rgba(0,229,255,.1);
  border:1px solid rgba(0,229,255,.3);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
#pwa-banner .pb-text{flex:1}
#pwa-banner .pb-title{font-size:14px;font-weight:900;color:var(--text);margin-bottom:3px}
#pwa-banner .pb-sub{font-size:11px;color:var(--muted)}
#pwa-banner .pb-btns{display:flex;gap:8px;margin-top:12px}
#pwa-banner .pb-install{padding:9px 20px;background:var(--cyan);color:#000;border:none;
  border-radius:8px;font-size:13px;font-weight:900;cursor:pointer;flex:1}
#pwa-banner .pb-close{padding:9px 16px;background:transparent;color:var(--muted);
  border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">📈</div>
      <div>
        <div class="logo-title">株価<span>監視</span>アプリ</div>
        <div class="logo-sub">STOCK ALERT DASHBOARD</div>
      </div>
    </div>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="stxt" style="color:var(--muted)">停止中</span>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="go('dash')">📊 ダッシュボード</div>
    <div class="tab" onclick="go('cfg')">⚙️ 設定</div>
  </div>

  <div id="dash">
    <div class="ctrl">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn bc" id="sbtn" onclick="toggle()">▶ 監視スタート</button>
        <button class="btn bo" onclick="openM()">＋ 銘柄追加</button>
        <button class="btn" style="background:rgba(255,224,102,.15);color:var(--yellow);border:1px solid rgba(255,224,102,.4)" onclick="toggleTP()">&#x1F4B9; トレード</button>
      </div>
      <div style="font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace" id="nxt"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="chart-panel" id="chartPanel" style="display:none">
      <div class="chart-top">
        <div class="chart-name">&#x1F4C9; <span id="ctitle">&#x30C1;&#x30E3;&#x30FC;&#x30C8;</span></div>
        <div class="rng-row">
          <button class="rbtn active" id="r1mo" onclick="setR('1mo')">1M</button>
          <button class="rbtn" id="r3mo" onclick="setR('3mo')">3M</button>
          <button class="rbtn" id="r6mo" onclick="setR('6mo')">6M</button>
          <button class="rbtn" id="r1y" onclick="setR('1y')">1Y</button>
        </div>
      </div>
      <div class="ct-row">
        <div class="ctab yact" id="ct-candle" onclick="setCT('candle')">&#x1F4CA; &#x30ED;&#x30FC;&#x30BD;&#x30AF;&#x8DB3;</div>
        <div class="ctab" id="ct-price" onclick="setCT('price')">&#x6298;&#x308C;&#x7DDA;</div>
        <div class="ctab" id="ct-rsi" onclick="setCT('rsi')">RSI</div>
        <div class="ctab" id="ct-ma" onclick="setCT('ma')">&#x79FB;&#x52D5;&#x5E73;&#x5747;</div>
        <div class="ctab" id="ct-bb" onclick="setCT('bb')">BB</div>
        <div class="ctab" id="ct-macd" onclick="setCT('macd')">MACD</div>
        <div class="ctab" id="ct-sar" onclick="setCT('sar')">&#x30D1;&#x30E9;&#x30DC;&#x30EA;&#x30C3;&#x30AF;</div>
      </div>
      <div id="bb-opts" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--dim)">
        <span style="font-weight:700;color:var(--cyan)">BB 表示幅:</span>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-1s" onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±1σ</label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-2s" checked onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±2σ</label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-3s" onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±3σ</label>
      </div>
      <div id="bb-opts" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--dim)">
        <span style="font-weight:700;color:var(--cyan)">BB 表示幅:</span>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-1s" onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±1σ</label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-2s" checked onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±2σ</label>
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer"><input type="checkbox" id="bb-3s" onchange="reDrawBB()" style="accent-color:var(--cyan)"> ±3σ</label>
      </div>
      <div class="chart-box" id="chartBox"></div>
    </div>
  </div>


  <div class="trade-panel" id="tradePanel" style="display:none">
    <div class="tpt">&#x1F4B9; バーチャルトレード</div>
    <div class="t-tabs">
      <button class="t-tab active" id="ttab-pos" onclick="setTT('pos')">ポジション</button>
      <button class="t-tab" id="ttab-hist" onclick="setTT('hist')">取引履歴</button>
      <button class="t-tab" id="ttab-add" onclick="setTT('add')">＋ 取引追加</button>
    </div>
    <div id="tp-pos">
      <div class="smry" id="tSmry"></div>
      <div class="t-tbl-wrap"><table class="t-tbl"><thead><tr><th>銘柄</th><th>種別</th><th>取得日</th><th>取得値</th><th>株数</th><th>現在値</th><th>損益</th><th>損益率</th><th></th></tr></thead><tbody id="tPosBody"></tbody></table></div>
    </div>
    <div id="tp-hist" style="display:none">
      <div class="t-tbl-wrap"><table class="t-tbl"><thead><tr><th>銘柄</th><th>種別</th><th>日付</th><th>価格</th><th>株数</th><th>金額</th><th>メモ</th><th></th></tr></thead><tbody id="tHistBody"></tbody></table></div>
    </div>
    <div id="tp-add" style="display:none">
      <div class="t-form">
        <div><label>銘柄コード</label><input type="text" id="tf-code" placeholder="例: 285A"></div>
        <div><label>種別</label><select id="tf-type"><option value="buy">&#x1F7E2; 現物買い</option><option value="sell">&#x1F534; 現物売り</option><option value="mbuy">&#x1F7E1; 信用買い</option><option value="short">&#x1F7E3; 空売り</option></select></div>
        <div><label>日付</label><input type="date" id="tf-date"></div>
        <div><label>価格（円）</label><input type="number" id="tf-price" placeholder="例: 20500"></div>
        <div><label>株数</label><input type="number" id="tf-qty" value="100"></div>
        <div><label>メモ</label><input type="text" id="tf-memo" placeholder="任意"></div>
        <div style="display:flex;align-items:flex-end"><button class="btn bsm" style="width:100%;background:var(--yellow);color:#000;border:none" onclick="addTrade()">追加</button></div>
      </div>
    </div>
  </div>
  <div id="cfg" style="display:none">
    <div class="sgrid">
      <div class="panel">
        <div class="ptitle">Discord Webhook</div>
        <label>Webhook URL</label>
        <input type="text" id="cw" placeholder="https://discord.com/api/webhooks/...">
        <div class="hint">DiscordのWebhook URLを貼り付けてください</div>
        <label>チェック間隔（分）</label>
        <input type="number" id="ci" value="5" min="1" max="60">
        <label>再通知抑制（分）</label>
        <input type="number" id="cc" value="60" min="10">
        <button class="btn bc bsm" onclick="saveCfg()">💾 保存</button>
      </div>
      <div class="panel">
        <div class="ptitle">通知テスト</div>
        <p style="font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.7">Discordへテスト通知を送って動作確認できます。</p>
        <button class="btn bo bsm" onclick="testD()">📨 Discordテスト送信</button>
        <hr>
        <div class="ptitle" style="margin-top:4px">データ管理</div>
        <p style="font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.7">銘柄・設定はブラウザに自動保存されます。</p>
        <button class="btn br bsm" onclick="clrAll()">🗑️ 全データ削除</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div style="font-size:16px;font-weight:900;color:var(--cyan);margin-bottom:20px">銘柄を追加</div>
    <label>証券コード（東証）</label>
    <input type="text" id="mc" placeholder="例: 285A, 7203, 6758">
    <label>銘柄名</label>
    <input type="text" id="mn" placeholder="例: キオクシア">
    <hr>
    <label>目標価格（円）—この価格以下で通知</label>
    <input type="number" id="mp" placeholder="例: 20200">
    <label>RSI閾値—この値以下で通知（日足・週足）</label>
    <input type="number" id="mr" value="30">
    <div class="crow"><input type="checkbox" id="mm" checked><label for="mm">MA5/MA25 ゴールデン・デッドクロスを通知</label></div>
    <div class="crow"><input type="checkbox" id="mb" checked><label for="mb">PBR割安・割高アラート（1年平均比較）</label></div>
    <div class="mfoot">
      <button class="btn bo" onclick="closeM()">キャンセル</button>
      <button class="btn bc" onclick="addS()">追加する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SK='kbk4';
let D=load(),tmr=null,ctmr=null,running=false;

function load(){try{return JSON.parse(localStorage.getItem(SK))||def()}catch(e){return def()}}
function save(){localStorage.setItem(SK,JSON.stringify(D))}
function def(){return{wh:'',iv:5,cd:60,stocks:{},cds:{}}}

function go(t){
  document.getElementById('dash').style.display=t==='dash'?'':'none';
  document.getElementById('cfg').style.display=t==='cfg'?'':'none';
  document.querySelectorAll('.tab').forEach((x,i)=>x.classList.toggle('active',(i===0&&t==='dash')||(i===1&&t==='cfg')));
  if(t==='cfg'){document.getElementById('cw').value=D.wh||'';document.getElementById('ci').value=D.iv||5;document.getElementById('cc').value=D.cd||60;}
}

function saveCfg(){D.wh=document.getElementById('cw').value.trim();D.iv=parseInt(document.getElementById('ci').value)||5;D.cd=parseInt(document.getElementById('cc').value)||60;save();toast('✅ 保存しました')}

function openM(){document.getElementById('modal').classList.add('open')}
function closeM(){
  document.getElementById('modal').classList.remove('open');
  ['mc','mn','mp'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mr').value='30';
  document.getElementById('mm').checked=true;document.getElementById('mb').checked=true;
}

function addS(){
  const c=document.getElementById('mc').value.trim().toUpperCase();
  const n=document.getElementById('mn').value.trim();
  const p=document.getElementById('mp').value;
  const r=document.getElementById('mr').value;
  const ma=document.getElementById('mm').checked;
  const pb=document.getElementById('mb').checked;
  if(!c||!n){toast('⚠️ 証券コードと銘柄名は必須です',1);return}
  if(D.stocks[c]){toast('⚠️ すでに登録済みです',1);return}
  D.stocks[c]={name:n,tp:p?parseInt(p):null,ri:r?parseInt(r):null,uma:ma,upb:pb,price:null,chg:null,rd:null,rw:null,m5:null,m25:null,pc:null,pa:null,upd:null,alts:[]};
  save();closeM();render();toast('✅ '+n+'（'+c+'）を追加しました');
}

function delS(c){
  if(!confirm('「'+D.stocks[c]?.name+'（'+c+'）」を削除しますか？'))return;
  delete D.stocks[c];save();render();toast('🗑️ 削除しました',0,'#ff4d6d');
}

function render(){
  const g=document.getElementById('grid');
  const cs=Object.keys(D.stocks);
  if(!cs.length){g.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div>銘柄が登録されていません<br>「＋ 銘柄追加」から追加してください</div></div>';return;}
  g.innerHTML=cs.map((c,i)=>card(c,i)).join('');
}

function card(c,i){
  const s=D.stocks[c];
  const ps=s.price?Math.round(s.price).toLocaleString()+'円':'---';
  let ch='';
  if(s.chg!=null){const cl=s.chg>0?'up':'dn';const sg=s.chg>0?'+':'';ch='<span class="pchg '+cl+'">'+sg+s.chg.toFixed(1)+'%</span>';}
  const rdc=s.rd!=null?(s.rd<=(s.ri||30)?'alert':s.rd<=40?'warn':''):'';
  const rwc=s.rw!=null?(s.rw<=(s.ri||30)?'alert':s.rw<=40?'warn':''):'';
  const pbc=s.pc!=null&&s.pa!=null?(s.pc<s.pa*.85?'good':s.pc>s.pa*1.15?'warn':''):'';
  const tags=[];
  if(s.tp)tags.push('<span class="tag t-price">目標 '+s.tp.toLocaleString()+'円</span>');
  if(s.ri)tags.push('<span class="tag t-rsi">RSI≤'+s.ri+'</span>');
  if(s.uma)tags.push('<span class="tag t-ma">MA5/25</span>');
  if(s.upb)tags.push('<span class="tag t-pbr">PBR比較</span>');
  (s.alts||[]).forEach(a=>tags.push('<span class="tag t-fire">🔔 '+a+'</span>'));
  return '<div class="card '+(s.alts?.length?'fired':'')+'" onclick="clickCard(\''+c+'\')" style="animation-delay:'+i*.05+'s">'+
    '<div class="card-head"><div><div class="code">'+c+'</div><div class="cname">'+s.name+'</div></div>'+
    '<div class="acts"><div class="ibtn" onclick="one(\''+c+'\')" title="更新">🔄</div>'+
    '<div class="ibtn del" onclick="delS(\''+c+'\')" title="削除">✕</div></div></div>'+
    '<div class="prow"><div class="pmain">'+ps+'</div>'+ch+'</div>'+
    '<div class="inds">'+
    '<div class="ibox"><div class="ilbl">日足 RSI</div><div class="ival '+rdc+'">'+(s.rd!=null?s.rd.toFixed(1):'---')+'</div></div>'+
    '<div class="ibox"><div class="ilbl">週足 RSI</div><div class="ival '+rwc+'">'+(s.rw!=null?s.rw.toFixed(1):'---')+'</div></div>'+
    '<div class="ibox"><div class="ilbl">MA5 / MA25</div><div class="ival" style="font-size:12px">'+(s.m5?Math.round(s.m5).toLocaleString():'---')+' / '+(s.m25?Math.round(s.m25).toLocaleString():'---')+'</div></div>'+
    '<div class="ibox"><div class="ilbl">PBR（現在/1年平均）</div><div class="ival '+pbc+'" style="font-size:12px">'+(s.pc?s.pc.toFixed(2):'---')+' / '+(s.pa?s.pa.toFixed(2):'---')+'</div></div>'+
    '</div><div class="tags">'+(tags.join('')||'<span style="font-size:11px;color:var(--muted)">条件未設定</span>')+'</div>'+
    '<div class="upd">'+(s.upd?'最終更新: '+s.upd:'未取得')+'<span class="click-hint">&#x25BC; チャート</span></div></div>';
}

function rsi(cls,p=14){
  let g=0,l=0;
  for(let i=cls.length-p;i<cls.length;i++){const d=cls[i]-cls[i-1];d>0?g+=d:l-=d;}
  return 100-(100/(1+g/(l||.001)));
}
function avg(a){return a.reduce((x,y)=>x+y,0)/a.length}

async function fetchS(code){
  const r1=await fetch('/api/stock?code='+code+'&interval=1d&range=3mo');
  const d1=await r1.json();
  const c1=d1?.chart?.result?.[0];
  if(!c1)throw new Error('データなし');
  const cl=c1.indicators.quote[0].close.filter(v=>v!=null);
  const m=c1.meta;
  const price=m.regularMarketPrice||cl[cl.length-1];
  const prev=m.previousClose||cl[cl.length-2];
  const chg=prev?(price-prev)/prev*100:null;
  let rw=null;
  try{
    const r2=await fetch('/api/stock?code='+code+'&interval=1wk&range=2y');
    const d2=await r2.json();
    const c2=d2?.chart?.result?.[0];
    if(c2){const cw=c2.indicators.quote[0].close.filter(v=>v!=null);if(cw.length>=15)rw=rsi(cw);}
  }catch(e){}
  let pc=null,pa=null;
  try{
    const r3=await fetch('/api/stock?code='+code+'&type=summary');
    const d3=await r3.json();
    const st=d3?.quoteSummary?.result?.[0]?.defaultKeyStatistics;
    if(st?.priceToBook?.raw){pc=st.priceToBook.raw;const av=avg(cl);pa=pc*(av/price);}
  }catch(e){}
  const rd=cl.length>=15?rsi(cl):null;
  const m5=cl.length>=5?avg(cl.slice(-5)):null;
  const m25=cl.length>=25?avg(cl.slice(-25)):null;
  let cross=null;
  if(cl.length>=26){const pm5=avg(cl.slice(-6,-1));const pm25=avg(cl.slice(-26,-1));if(pm5<pm25&&m5>m25)cross='g';if(pm5>pm25&&m5<m25)cross='d';}
  return{price,chg,rd,rw,m5,m25,pc,pa,cross};
}

async function one(c){
  const s=D.stocks[c];if(!s)return;
  try{
    const r=await fetchS(c);
    s.price=r.price;s.chg=r.chg;s.rd=r.rd;s.rw=r.rw;s.m5=r.m5;s.m25=r.m25;s.pc=r.pc;s.pa=r.pa;
    s.upd=new Date().toLocaleTimeString('ja-JP');s.alts=[];
    const now=Date.now();const cd=D.cds[c]||{};
    const ok=(k,m)=>now-(cd[k]||0)>m*60000;
    const set=(k)=>{if(!D.cds[c])D.cds[c]={};D.cds[c][k]=now};
    const msgs=[];const cdm=D.cd||60;
    if(s.tp&&r.price<=s.tp&&ok('p',cdm)){s.alts.push('目標価格到達');msgs.push('📉 **【目標価格到達】'+s.name+'（'+c+'）**\n現在値: '+Math.round(r.price).toLocaleString()+'円\n目標: '+s.tp.toLocaleString()+'円以下 ✅');set('p');}
    if(s.ri&&r.rd!=null&&r.rd<=s.ri&&ok('rd',cdm)){s.alts.push('日足RSI '+r.rd.toFixed(1));msgs.push('📊 **【日足RSI売られすぎ】'+s.name+'（'+c+'）**\n日足RSI: '+r.rd.toFixed(1)+'\n現在値: '+Math.round(r.price).toLocaleString()+'円');set('rd');}
    if(s.ri&&r.rw!=null&&r.rw<=s.ri&&ok('rw',cdm*24)){s.alts.push('週足RSI '+r.rw.toFixed(1));msgs.push('📊 **【週足RSI売られすぎ】'+s.name+'（'+c+'）**\n週足RSI: '+r.rw.toFixed(1)+'\n現在値: '+Math.round(r.price).toLocaleString()+'円');set('rw');}
    if(s.uma&&r.cross==='g'&&ok('gc',cdm*24)){s.alts.push('ゴールデンクロス');msgs.push('✨ **【ゴールデンクロス】'+s.name+'（'+c+'）**\n現在値: '+Math.round(r.price).toLocaleString()+'円');set('gc');}
    if(s.uma&&r.cross==='d'&&ok('dc',cdm*24)){s.alts.push('デッドクロス');msgs.push('⚠️ **【デッドクロス】'+s.name+'（'+c+'）**\n現在値: '+Math.round(r.price).toLocaleString()+'円');set('dc');}
    if(s.upb&&r.pc&&r.pa){
      const df=(r.pc-r.pa)/r.pa*100;
      if(df<=-15&&ok('bc',cdm*24)){s.alts.push('PBR割安 '+df.toFixed(1)+'%');msgs.push('💰 **【PBR割安】'+s.name+'（'+c+'）**\nPBR: '+r.pc.toFixed(2)+' / 1年平均: '+r.pa.toFixed(2)+'\n'+Math.abs(df).toFixed(1)+'% 割安');set('bc');}
      if(df>=15&&ok('be',cdm*24)){s.alts.push('PBR割高 +'+df.toFixed(1)+'%');msgs.push('🔔 **【PBR割高】'+s.name+'（'+c+'）**\nPBR: '+r.pc.toFixed(2)+' / 1年平均: '+r.pa.toFixed(2)+'\n'+df.toFixed(1)+'% 割高');set('be');}
    }
    for(const msg of msgs)await disc(msg);
    save();
  }catch(e){s.upd='エラー: '+e.message;save();}
  render();
}

async function all(){
  const cs=Object.keys(D.stocks);if(!cs.length)return;
  setSt('on','チェック中...');
  for(let i=0;i<cs.length;i++){await one(cs[i]);if(i<cs.length-1)await new Promise(r=>setTimeout(r,1500));}
  setSt('on','監視中 — 次回: '+D.iv+'分後');
  startCd();
}

function startCd(){
  clearInterval(ctmr);
  let end=Date.now()+(D.iv||5)*60000;
  ctmr=setInterval(()=>{
    const rem=Math.max(0,Math.round((end-Date.now())/1000));
    const mm=Math.floor(rem/60),ss=rem%60;
    document.getElementById('nxt').textContent='次回チェックまで '+mm+':'+String(ss).padStart(2,'0');
    if(!rem)clearInterval(ctmr);
  },1000);
}

function toggle(){running?stop():start()}

function start(){
  if(!D.wh){toast('⚠️ まず「設定」タブでWebhook URLを入力してください',1);go('cfg');return}
  if(!Object.keys(D.stocks).length){toast('⚠️ 銘柄を追加してください',1);return}
  running=true;
  document.getElementById('sbtn').textContent='⏹ 監視停止';
  document.getElementById('sbtn').className='btn br';
  setSt('on','監視中');
  all();
  tmr=setInterval(all,(D.iv||5)*60000);
}

function stop(){
  running=false;clearInterval(tmr);clearInterval(ctmr);tmr=null;
  document.getElementById('sbtn').textContent='▶ 監視スタート';
  document.getElementById('sbtn').className='btn bc';
  document.getElementById('nxt').textContent='';
  setSt('','停止中');
}

function setSt(t,x){
  const d=document.getElementById('dot');const s=document.getElementById('stxt');
  d.className='dot '+(t==='on'?'on':'');s.textContent=x;
  s.style.color=t==='on'?'var(--green)':'var(--muted)';
}

async function disc(msg){
  if(!D.wh)return;
  try{await fetch(D.wh,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:msg})});}
  catch(e){}
}

async function testD(){
  const u=document.getElementById('cw').value.trim();
  if(!u){toast('⚠️ Webhook URLを入力してください',1);return}
  D.wh=u;save();
  try{
    const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:'✅ **株価監視アプリ** テスト通知です！正常に動作しています🎉'})});
    toast(r.ok||r.status===204?'✅ Discordにテスト通知を送りました！':'⚠️ 送信失敗（URLを確認してください）',!(r.ok||r.status===204));
  }catch(e){toast('⚠️ '+e.message,1);}
}

function clrAll(){
  if(!confirm('全データを削除しますか？'))return;
  localStorage.removeItem(SK);D=def();render();toast('🗑️ 削除しました',0,'#ff4d6d');
}

function toast(msg,err=0,col=null){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast'+(err?' err':'');
  if(col){t.style.borderColor=col;t.style.color=col;}else{t.style.borderColor='';t.style.color='';}
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}


var selCode=null,curRng='1mo',curCT='candle',lwC=null,chartMC=null,CD={};
function clickCard(c){
  selCode=c;render();
  var panel=document.getElementById('chartPanel');panel.style.display='';
  var s=D.stocks[c];
  document.getElementById('ctitle').textContent=(s?s.name:'')+' ('+c+')';
  loadChart(c,curRng);
  document.getElementById('tf-code').value=c;
  if(document.getElementById('tradePanel').style.display!=='none')renderT();
  setTimeout(function(){panel.scrollIntoView({behavior:'smooth',block:'start'});},150);
}
function setR(r){
  curRng=r;['1mo','3mo','6mo','1y'].forEach(function(x){document.getElementById('r'+x).classList.toggle('active',x===r);});
  if(selCode)loadChart(selCode,r);
}
function setCT(t){
  curCT=t;
  document.getElementById('ct-candle').className='ctab'+(t==='candle'?' yact':'');
  ['price','rsi','ma','bb','macd','sar'].forEach(function(x){document.getElementById('ct-'+x).className='ctab'+(t===x?' active':'');});
  document.getElementById('bb-opts').style.display=t==='bb'?'flex':'none';
  if(selCode&&CD[selCode])drawChart(selCode);
}
function mavg(a,n){return a.map(function(_,i){if(i<n-1)return null;var s=0;for(var j=i-n+1;j<=i;j++)s+=a[j];return s/n;});}
async function loadChart(code,r){
  try{
    var url='/api/stock?code='+code+'&interval=1d&range='+r;
    var res=await fetch(url),d=await res.json();
    var ch=d&&d.chart&&d.chart.result&&d.chart.result[0];if(!ch)return;
    var q=ch.indicators.quote[0];
    CD[code]={ts:ch.timestamp,op:q.open,hi:q.high,lo:q.low,cl:q.close};
    drawChart(code);
  }catch(e){console.warn('chart',e);}
}
function killCharts(){
  if(lwC){try{lwC.remove();}catch(e){}lwC=null;}
  if(chartMC){try{chartMC.destroy();}catch(e){}chartMC=null;}
  document.getElementById('chartBox').innerHTML='';
}
function drawChart(code){
  var d=CD[code];if(!d)return;killCharts();
  var box=document.getElementById('chartBox');
  if(curCT==='candle'){drawCandle(code,d,box);}
  else{
    var cv=document.createElement('canvas');cv.style.width='100%';cv.style.height='100%';box.appendChild(cv);
    var ctx=cv.getContext('2d');
    if(curCT==='price')drawLine(code,d,ctx);
    else if(curCT==='rsi')drawRSIc(d,ctx);
    else if(curCT==='bb')   drawBB(d,ctx);
    else if(curCT==='macd') drawMACD(d,ctx);
    else if(curCT==='sar')  drawSAR(code,d,box);
    else                    drawMAc(d,ctx);
  }
}
function toDS(t){var dt=new Date((t+32400)*1000);return dt.toISOString().slice(0,10);}
function drawCandle(code,d,box){
  var s=D.stocks[code];
  lwC=LightweightCharts.createChart(box,{
    width:box.offsetWidth,height:360,
    layout:{background:{color:'#060a12'},textColor:'#7a9ab8'},
    grid:{vertLines:{color:'rgba(28,46,72,.5)'},horzLines:{color:'rgba(28,46,72,.5)'}},
    crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
    rightPriceScale:{borderColor:'#1c2e48'},timeScale:{borderColor:'#1c2e48',timeVisible:false},
    localization:{priceFormatter:function(p){return Math.round(p).toLocaleString()+'円';}}
  });
  var cs=lwC.addCandlestickSeries({upColor:'#00ff9d',downColor:'#ff4d6d',borderUpColor:'#00ff9d',borderDownColor:'#ff4d6d',wickUpColor:'#00ff9d',wickDownColor:'#ff4d6d'});
  var raw=[],seen={};
  for(var i=0;i<d.ts.length;i++){
    if(d.op[i]!=null&&d.hi[i]!=null&&d.lo[i]!=null&&d.cl[i]!=null){
      var ds=toDS(d.ts[i]);if(!seen[ds]){seen[ds]=true;raw.push({time:ds,open:d.op[i],high:d.hi[i],low:d.lo[i],close:d.cl[i]});}
    }
  }
  cs.setData(raw);
  var cls=raw.map(function(x){return x.close;});
  var m5=lwC.addLineSeries({color:'rgba(0,255,157,.8)',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  m5.setData(raw.map(function(x,i){if(i<4)return null;var s=0;for(var j=i-4;j<=i;j++)s+=cls[j];return{time:x.time,value:s/5};}).filter(Boolean));
  var m25=lwC.addLineSeries({color:'rgba(179,136,255,.8)',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
  m25.setData(raw.map(function(x,i){if(i<24)return null;var s=0;for(var j=i-24;j<=i;j++)s+=cls[j];return{time:x.time,value:s/25};}).filter(Boolean));
  if(s&&s.tp)cs.createPriceLine({price:s.tp,color:'rgba(255,224,102,.9)',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'目標'});
  var mkrs=(D.trades||[]).filter(function(t){return t.code===code;})
    .map(function(t){
      var up=t.type==='buy'||t.type==='mbuy'||t.type==='short';
      var col=t.type==='buy'?'#00ff9d':t.type==='sell'?'#ff4d6d':t.type==='mbuy'?'#ffe066':'#b388ff';
      return {time:t.date,position:up?'belowBar':'aboveBar',color:col,
        shape:up?'arrowUp':'arrowDown',
        text:TL[t.type]+' '+t.price.toLocaleString()+'円×'+t.qty};

function calcBB(cl, n, mult) {
  var mid=[], upper=[], lower=[];
  for(var i=0;i<cl.length;i++){
    if(i<n-1){mid.push(null);upper.push(null);lower.push(null);continue;}
    var sl=cl.slice(i-n+1,i+1);
    var m=sl.reduce(function(a,b){return a+b;},0)/n;
    var v=sl.reduce(function(a,b){return a+(b-m)*(b-m);},0)/n;
    var sd=Math.sqrt(v);
    mid.push(m); upper.push(m+mult*sd); lower.push(m-mult*sd);
  }
  return {mid:mid,upper:upper,lower:lower};
}

// MACD (12, 26, 9)
function drawMACD(d, ctx) {
  var lb = mkLbls(d), cl = d.cl;
  function ema(data, n) {
    var k = 2/(n+1), res = [];
    for (var i = 0; i < data.length; i++) {
      if (i === 0) { res.push(data[0]); continue; }
      res.push(data[i] * k + res[i-1] * (1-k));
    }
    return res;
  }
  var ema12 = ema(cl, 12), ema26 = ema(cl, 26);
  var macdLine = cl.map(function(_,i){ return i<25?null:ema12[i]-ema26[i]; });
  var macdValid = macdLine.filter(function(v){return v!==null;});
  var signalFull = ema(macdValid, 9);
  var signal = macdLine.map(function(v,i){
    var idx = macdLine.slice(0,i+1).filter(function(x){return x!==null;}).length - 1;
    return v===null?null:signalFull[idx];
  });
  var hist = macdLine.map(function(v,i){ return v===null?null:v-signal[i]; });
  // ヒストグラム色分け
  var histPos = hist.map(function(v){ return v!==null&&v>=0?v:null; });
  var histNeg = hist.map(function(v){ return v!==null&&v<0?v:null; });

  // 2軸: 上にMACD線、下にヒストグラム
  chartMC = new Chart(ctx, {
    type:'bar',
    data:{
      labels:lb,
      datasets:[
        {type:'bar', label:'ヒスト(+)', data:histPos, backgroundColor:'rgba(0,255,157,.6)', borderColor:'rgba(0,255,157,.8)', borderWidth:0, order:2},
        {type:'bar', label:'ヒスト(-)', data:histNeg, backgroundColor:'rgba(255,77,109,.6)', borderColor:'rgba(255,77,109,.8)', borderWidth:0, order:2},
        {type:'line', label:'MACD', data:macdLine, borderColor:'#00e5ff', borderWidth:2, pointRadius:0, fill:false, tension:.3, order:1},
        {type:'line', label:'シグナル(9)', data:signal, borderColor:'#ffe066', borderWidth:1.5, pointRadius:0, fill:false, tension:.3, borderDash:[4,3], order:1},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#7a9ab8',font:{family:'JetBrains Mono',size:11},boxWidth:20,padding:12}},
        tooltip:{backgroundColor:'rgba(13,21,36,.95)',titleColor:'#00e5ff',bodyColor:'#dce8f5',borderColor:'#1c2e48',borderWidth:1,
          callbacks:{label:function(c){var v=c.raw;if(v===null)return null;return c.dataset.label+': '+v.toFixed(3);}}}
      },
      scales:{
        x:{ticks:{color:'#4a6380',font:{family:'JetBrains Mono',size:10},maxTicksLimit:10},grid:{color:'rgba(28,46,72,.4)'}},
        y:{ticks:{color:'#4a6380',font:{family:'JetBrains Mono',size:10},callback:function(v){return v.toFixed(1);}},grid:{color:'rgba(28,46,72,.4)'}}
      }
    }
  });
}

// パラボリックSAR
function drawSAR(code, d, box) {
  var s=D.stocks[code];
  try {
    lwC=LightweightCharts.createChart(box,{
      width:box.offsetWidth||600,height:360,
      layout:{background:{color:'#060a12'},textColor:'#7a9ab8'},
      grid:{vertLines:{color:'rgba(28,46,72,.5)'},horzLines:{color:'rgba(28,46,72,.5)'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      rightPriceScale:{borderColor:'#1c2e48'},
      timeScale:{borderColor:'#1c2e48',timeVisible:false},
      localization:{priceFormatter:function(p){return Math.round(p).toLocaleString()+'円';}}
    });
    var cs=lwC.addCandlestickSeries({
      upColor:'#00ff9d',downColor:'#ff4d6d',
      borderUpColor:'#00ff9d',borderDownColor:'#ff4d6d',
      wickUpColor:'#00ff9d',wickDownColor:'#ff4d6d'
    });
    var raw=[],seen={};
    for(var i=0;i<d.ts.length;i++){
      if(d.op[i]!=null&&d.hi[i]!=null&&d.lo[i]!=null&&d.cl[i]!=null){
        var ds=toDS(d.ts[i]);
        if(!seen[ds]){seen[ds]=true;raw.push({time:ds,open:d.op[i],high:d.hi[i],low:d.lo[i],close:d.cl[i]});}
      }
    }
    cs.setData(raw);

    // パラボリックSAR計算 (AF=0.02, step=0.02, max=0.2)
    var af0=0.02,afStep=0.02,afMax=0.2;
    var sarArr=[],trend=1,af=af0,ep,sar;
    if(raw.length<3){lwC.timeScale().fitContent();return;}
    // 初期値: 最初の2本で判断
    trend = raw[1].close >= raw[0].close ? 1 : -1;
    if(trend===1){ sar=raw[0].low; ep=raw[0].high; }
    else { sar=raw[0].high; ep=raw[0].low; }

    for(var i=1;i<raw.length;i++){
      var cur=raw[i];
      var newSar=sar+af*(ep-sar);
      if(trend===1){
        // 上昇: SARは直近2本の安値以下
        newSar=Math.min(newSar,raw[i-1].low,i>=2?raw[i-2].low:raw[i-1].low);
        if(cur.low<=newSar){
          // トレンド反転→下降
          trend=-1; sar=ep; ep=cur.low; af=af0;
          newSar=sar;
        } else {
          sar=newSar;
          if(cur.high>ep){ep=cur.high;af=Math.min(af+afStep,afMax);}
        }
      } else {
        // 下降: SARは直近2本の高値以上
        newSar=Math.max(newSar,raw[i-1].high,i>=2?raw[i-2].high:raw[i-1].high);
        if(cur.high>=newSar){
          // トレンド反転→上昇
          trend=1; sar=ep; ep=cur.high; af=af0;
          newSar=sar;
        } else {
          sar=newSar;
          if(cur.low<ep){ep=cur.low;af=Math.min(af+afStep,afMax);}
        }
      }
      sarArr.push({time:cur.time,value:newSar,trend:trend});
    }

    // 上昇SAR（ローソク下・青）と下降SAR（ローソク上・赤）を別ラインシリーズで表示
    // セグメントに分割して連続線を描画
    var upSegs=[],downSegs=[],curSeg=[],curTrend=null;
    sarArr.forEach(function(p){
      if(p.trend!==curTrend){
        if(curSeg.length>0){
          if(curTrend===1) upSegs.push(curSeg.slice());
          else downSegs.push(curSeg.slice());
        }
        curSeg=[{time:p.time,value:p.value}];
        curTrend=p.trend;
      } else {
        curSeg.push({time:p.time,value:p.value});
      }
    });
    if(curSeg.length>0){
      if(curTrend===1) upSegs.push(curSeg);
      else downSegs.push(curSeg);
    }

    // 上昇セグメント（青・太め）
    upSegs.forEach(function(seg){
      var ls=lwC.addLineSeries({color:'rgba(0,229,255,.9)',lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerRadius:4,crosshairMarkerBorderColor:'#00e5ff',crosshairMarkerBackgroundColor:'#00e5ff'});
      ls.setData(seg);
    });
    // 下降セグメント（赤・太め）
    downSegs.forEach(function(seg){
      var ls=lwC.addLineSeries({color:'rgba(255,77,109,.9)',lineWidth:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerRadius:4,crosshairMarkerBorderColor:'#ff4d6d',crosshairMarkerBackgroundColor:'#ff4d6d'});
      ls.setData(seg);
    });

    // MA5
    var cls=raw.map(function(x){return x.close;});
    var m5s=lwC.addLineSeries({color:'rgba(0,255,157,.6)',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
    m5s.setData(raw.map(function(x,i){if(i<4)return null;var sm=0;for(var j=i-4;j<=i;j++)sm+=cls[j];return{time:x.time,value:sm/5};}).filter(Boolean));

    // 取引マーカー
    var mkrs=(D.trades||[]).filter(function(t){return t.code===code;})
      .map(function(t){
        var up=t.type==='buy'||t.type==='mbuy'||t.type==='short';
        var col=t.type==='buy'?'#00ff9d':t.type==='sell'?'#ff4d6d':t.type==='mbuy'?'#ffe066':'#b388ff';
        return {time:t.date,position:up?'belowBar':'aboveBar',color:col,shape:up?'arrowUp':'arrowDown',
          text:TL[t.type]+' '+t.price.toLocaleString()+'円×'+t.qty};
      }).sort(function(a,b){return a.time.localeCompare(b.time);});
    if(mkrs.length)cs.setMarkers(mkrs);

    if(s&&s.tp)cs.createPriceLine({price:s.tp,color:'rgba(255,224,102,.9)',lineWidth:1,lineStyle:2,axisLabelVisible:true,title:'目標'});
    lwC.timeScale().fitContent();
    var ro=new ResizeObserver(function(){if(lwC)lwC.applyOptions({width:box.offsetWidth});});
    ro.observe(box);
  } catch(e){
    box.innerHTML='<div class="chart-err">パラボリックエラー: '+e.message+'</div>';
    console.error('SAR error',e);
  }
}

  // Android: インストールバナー表示
  if (!localStorage.getItem('pwa-dismissed')) {
    document.getElementById('pwa-banner').style.display = 'block';
  }
});

window.addEventListener('appinstalled', function() {
  document.getElementById('pwa-banner').style.display = 'none';
  _pwaPrompt = null;
});

function pwaInstall() {
  if (_pwaPrompt) {
    // Android Chrome: ネイティブプロンプト
    _pwaPrompt.prompt();
    _pwaPrompt.userChoice.then(function(r) {
      _pwaPrompt = null;
      document.getElementById('pwa-banner').style.display = 'none';
    });
  } else {
    // iOS Safari向け案内
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      alert('iPhoneでインストールするには:\n\n① 下の「共有」ボタン（□↑）をタップ\n② 「ホーム画面に追加」を選択\n③「追加」をタップ');
    } else {
      alert('ブラウザのメニューから「ホーム画面に追加」または「アプリをインストール」を選択してください');
    }
  }
}

function pwaBannerClose() {
  document.getElementById('pwa-banner').style.display = 'none';
  localStorage.setItem('pwa-dismissed', '1');
}

// iOS: 常にバナー表示（beforeinstallpromptが発火しないため）
(function() {
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
  var isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !localStorage.getItem('pwa-dismissed')) {
    document.getElementById('pb-sub').textContent = '「共有」→「ホーム画面に追加」でインストールできます';
    setTimeout(function() {
      document.getElementById('pwa-banner').style.display = 'block';
    }, 2000);
  }
})();
// ===== PWA END =====
render();
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js')
      .then(function(r){console.log('SW registered',r.scope);})
      .catch(function(e){console.log('SW error',e);});
  });
}
</script>
